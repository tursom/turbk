# Docker deployment config template.
#
# Usage:
#   cp deploy/server/config.example.yaml config.yaml
#   edit config.yaml
#   docker compose up -d
#
# Paths in this file are container paths. Host bind mount paths are configured
# in .env with TURBK_STATE_DIR, TURBK_REPO_DIR, and TURBK_RESTORE_DIR.
server:
  listen: ":8080"
  public_url: "http://localhost:8080"
  web_dir: "/app/web/dist"

auth:
  username: "admin"
  password: "change-me"
  session_ttl_hours: 24

paths:
  state_dir: "/var/lib/turbk/state"
  repo_dir: "/var/lib/turbk/repo"
  restore_roots:
    - "/var/lib/turbk/restore"

repository:
  # Match this to the SMR zone size when repo_dir is hosted on host-managed SMR.
  segment_size: "256MiB"
  chunk_avg_size: "1MiB"
  compression: "zstd"
  encryption: "aes-256-gcm"

scheduler:
  timezone: "Asia/Shanghai"
  max_concurrent_runs: 2

retention:
  keep_last: 30
  keep_daily: 30
  keep_weekly: 12

maintenance:
  enabled: true
  timezone: "Asia/Shanghai"
  cleanup_schedule: "0 3 * * *"
  compact_enabled: true
  compact_schedule: "30 3 * * 0"
  error_grace_period: "24h"
  stale_run_after: "6h"
  keep_deleted_metadata_days: 30
  compact_min_reclaim_ratio: 0.15
  compact_min_reclaim_bytes: "1GiB"
