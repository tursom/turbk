services:
  turbk-agent:
    image: ${TURBK_AGENT_IMAGE:-ghcr.io/tursom/turbk-agent:latest}
    build:
      context: ../..
      dockerfile: deploy/agent/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        VERSION: ${TURBK_AGENT_VERSION:-0.1.0-dev}
        COMMIT: ${TURBK_AGENT_COMMIT:-local}
        DATE: ${TURBK_AGENT_BUILD_DATE:-unknown}
    pull_policy: ${TURBK_AGENT_PULL_POLICY:-missing}
    user: "0:0"
    environment:
      TURBK_SERVER_URL: "${TURBK_SERVER_URL:?set TURBK_SERVER_URL}"
      TURBK_AGENT_ID: "${TURBK_AGENT_ID:?set TURBK_AGENT_ID}"
      TURBK_AGENT_SECRET: "${TURBK_AGENT_SECRET:?set TURBK_AGENT_SECRET}"
      TURBK_AGENT_DAEMON: "${TURBK_AGENT_DAEMON:-true}"
      TURBK_AGENT_STATE_DIR: "${TURBK_AGENT_STATE_DIR:-/var/lib/turbk-agent}"
      TURBK_AGENT_ROOTS: "${TURBK_AGENT_ROOTS:?set TURBK_AGENT_ROOTS}"
      TURBK_AGENT_CATALOG_BACKEND: "${TURBK_AGENT_CATALOG_BACKEND:-hybrid}"
      TURBK_AGENT_BACKUP_SCHEDULE: "${TURBK_AGENT_BACKUP_SCHEDULE:-0 0 * * *}"
      TURBK_AGENT_EXCLUDES: "${TURBK_AGENT_EXCLUDES:-}"
      TURBK_AGENT_SKIP_PSEUDO_FS: "${TURBK_AGENT_SKIP_PSEUDO_FS:-true}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
    volumes:
      - "${TURBK_AGENT_STATE_HOST_DIR:-./agent-state}:${TURBK_AGENT_STATE_DIR:-/var/lib/turbk-agent}"
      - "${TURBK_AGENT_SOURCE_DIR:?set TURBK_AGENT_SOURCE_DIR}:${TURBK_AGENT_SOURCE_DIR:?set TURBK_AGENT_SOURCE_DIR}:ro"
    restart: unless-stopped
