services:
  turbk:
    image: ${TURBK_IMAGE:-ghcr.io/tursom/turbk:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        VERSION: ${TURBK_VERSION:-0.1.0-dev}
        COMMIT: ${TURBK_COMMIT:-local}
        DATE: ${TURBK_BUILD_DATE:-unknown}
    pull_policy: ${TURBK_PULL_POLICY:-missing}
    restart: unless-stopped
    user: "0:0"
    command: ["-config", "/etc/turbk/config.yaml"]
    ports:
      - "${TURBK_HTTP_PORT:-8080}:8080"
    volumes:
      - "${TURBK_CONFIG_FILE:-./config.yaml}:/etc/turbk/config.yaml:ro"
      - "${TURBK_STATE_DIR:-./data/state}:/var/lib/turbk/state"
      - "${TURBK_REPO_DIR:-./data/repo}:/var/lib/turbk/repo"
      - "${TURBK_RESTORE_DIR:-./data/restore}:/var/lib/turbk/restore"
