services:
  turbk:
    image: ${TURBK_IMAGE:-ghcr.io/tursom/turbk:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        VERSION: ${TURBK_VERSION:-0.1.0-dev}
        COMMIT: ${TURBK_COMMIT:-local}
        DATE: ${TURBK_BUILD_DATE:-unknown}
    pull_policy: ${TURBK_PULL_POLICY:-missing}
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${TURBK_HTTP_PORT:-8080}:8080"
    environment:
      TURBK_LISTEN: ":8080"
      TURBK_PUBLIC_URL: "${TURBK_PUBLIC_URL:-http://localhost:8080}"
      TURBK_WEB_DIR: "/app/web/dist"
      TURBK_ADMIN_USERNAME: "${TURBK_ADMIN_USERNAME:-admin}"
      TURBK_ADMIN_PASSWORD: "${TURBK_ADMIN_PASSWORD:-admin}"
      TURBK_SESSION_TTL_HOURS: "${TURBK_SESSION_TTL_HOURS:-24}"
      TURBK_STATE_DIR: "/var/lib/turbk/state"
      TURBK_REPO_DIR: "/var/lib/turbk/repo"
      TURBK_RESTORE_ROOTS: "/var/lib/turbk/restore"
    volumes:
      - "${TURBK_STATE_DIR:-./data/state}:/var/lib/turbk/state"
      - "${TURBK_REPO_DIR:-./data/repo}:/var/lib/turbk/repo"
      - "${TURBK_RESTORE_DIR:-./data/restore}:/var/lib/turbk/restore"
