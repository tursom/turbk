server:
  listen: ":8080"
  public_url: "http://localhost:8080"
  web_dir: "web/dist"

auth:
  username: "admin"
  password: "admin"
  session_ttl_hours: 24

paths:
  state_dir: "./data/state"
  repo_dir: "./data/repo"
  restore_roots:
    - "./data/restore"

repository:
  segment_size: "512MiB"
  chunk_avg_size: "1MiB"
  compression: "zstd"
  encryption: "aes-256-gcm"

scheduler:
  timezone: "Asia/Shanghai"
  max_concurrent_runs: 2

retention:
  keep_last: 30
  keep_daily: 30
  keep_weekly: 12

maintenance:
  enabled: true
  timezone: "Asia/Shanghai"
  cleanup_schedule: "0 3 * * *"
  compact_enabled: true
  compact_schedule: "30 3 * * 0"
  error_grace_period: "24h"
  stale_run_after: "6h"
  keep_deleted_metadata_days: 30
  compact_min_reclaim_ratio: 0.15
  compact_min_reclaim_bytes: "1GiB"

agent:
  command_ttl: "30m"
  default_poll_interval: "10m"
  max_chunk_check_batch: 10000
  max_chunk_upload_batch_bytes: "64MiB"
  max_chunk_response_bytes: "64MiB"
  chunk_pipeline_enabled: false
  max_chunk_check_inflight: 1
  max_chunk_upload_inflight: 1
  max_chunk_pipeline_bytes: "128MiB"
  small_file_pack_enabled: false
  small_file_pack_max_file_size: "64KiB"
  small_file_pack_target_size: "8MiB"
  max_invalidation_response_hashes: 100000
  invalidation_retention_days: 30
