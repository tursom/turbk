server:
  listen: ":8080"
  public_url: "http://localhost:8080"
  web_dir: "web/dist"

auth:
  username: "admin"
  password: "admin"
  session_ttl_hours: 24

paths:
  state_dir: "./data/state"
  repo_dir: "./data/repo"
  restore_roots:
    - "./data/restore"

repository:
  segment_size: "512MiB"
  chunk_avg_size: "1MiB"
  compression: "zstd"
  encryption: "aes-256-gcm"

scheduler:
  timezone: "Asia/Shanghai"
  max_concurrent_runs: 2

retention:
  keep_last: 30
  keep_daily: 30
  keep_weekly: 12
